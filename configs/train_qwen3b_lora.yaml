# LoRA SFT of Qwen2.5-VL-3B on AndroidControl (Track A) — runs on the rented GPU.
# Launch from the repo root:  llamafactory-cli train configs/train_qwen3b_lora.yaml
#
# Prereqs on the box:
#   1) sharegpt_train.json built with ABSOLUTE image paths:
#        python src/make_sharegpt.py data/androidcontrol/steps_train.jsonl \
#               data/androidcontrol/sharegpt_train.json --abs
#   2) configs/dataset_info.json + sharegpt_train.json visible to --dataset_dir.
#      We point dataset_dir at configs/ and symlink/copy sharegpt_train.json there,
#      OR (simpler) set dataset_dir to the data folder. See gpu_runbook.sh.

### model
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
trust_remote_code: true
flash_attn: sdpa            # use torch's built-in SDPA (works on Blackwell/RTX 5090);
                           # avoids flash-attn 'fa2' wheels that lack sm_120 kernels

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

### dataset
dataset: gui_androidcontrol
dataset_dir: data/androidcontrol      # holds dataset_info.json + sharegpt_train.json
template: qwen2_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: out/qwen3b-trackA-lora
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

