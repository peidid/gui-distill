# LoRA SFT of Qwen2.5-VL-3B on TEACHER (UI-TARS) labels — Track B.
# IDENTICAL recipe to train_qwen3b_lora.yaml (Track A) except the dataset and
# output dir — so any A-vs-B difference is attributable to the LABELS, not the
# recipe. Launch:  llamafactory-cli train configs/train_qwen3b_lora_trackB.yaml
#
# Prereqs on the box:
#   1) data/androidcontrol/steps_trackB.jsonl  (from run_teacher.py)
#   2) sharegpt_trackB.json built with ABSOLUTE image paths:
#        python src/make_sharegpt.py data/androidcontrol/steps_trackB.jsonl \
#               data/androidcontrol/sharegpt_trackB.json --abs
#   3) cp configs/dataset_info.json data/androidcontrol/  (has gui_androidcontrol_trackB)

### model
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

### dataset
dataset: gui_androidcontrol_trackB     # <-- the only real change vs Track A
dataset_dir: data/androidcontrol
template: qwen2_vl
cutoff_len: 4096
overwrite_cache: false                 # cache tokenized data -> reruns skip preprocessing
preprocessing_num_workers: 1           # single worker = the progress bar TICKS (no 0%-stuck)

### output
output_dir: out/qwen3b-trackB-lora     # <-- separate dir, keeps Track A intact
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train  (identical to Track A)
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

### smoke test first (optional): uncomment to train on 200 samples, confirm loss
### drops, then comment back out for the full run.
# max_samples: 200
