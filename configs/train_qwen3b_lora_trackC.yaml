# LoRA SFT of Qwen2.5-VL-3B on a STRONGER teacher's labels — Track C.
# IDENTICAL recipe to Track A/B except dataset + output dir (clean teacher-sweep
# ablation). Teacher = UI-Venus-72B (primary) or GTA1-32B (alt).
# Launch:  llamafactory-cli train configs/train_qwen3b_lora_trackC.yaml
#
# Prereqs on the box:
#   1) data/androidcontrol/steps_trackC.jsonl  (from run_teacher.py with the
#      Track-C teacher + its parser)
#   2) sharegpt_trackC.json built with ABSOLUTE image paths:
#        python src/make_sharegpt.py data/androidcontrol/steps_trackC.jsonl \
#               data/androidcontrol/sharegpt_trackC.json --abs
#   3) cp configs/dataset_info.json data/androidcontrol/  (has gui_androidcontrol_trackC)

### model
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
trust_remote_code: true
flash_attn: sdpa

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

### dataset
dataset: gui_androidcontrol_trackC     # <-- the only real change vs A/B
dataset_dir: data/androidcontrol
template: qwen2_vl
cutoff_len: 4096
overwrite_cache: false
preprocessing_num_workers: 1

### output
output_dir: out/qwen3b-trackC-lora
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train  (identical to Track A/B)
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

# smoke test first (optional): uncomment, confirm loss drops, then re-comment.
# max_samples: 200
